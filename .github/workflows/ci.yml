name: CI - Build and Test

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    if: secrets.AWS_ACCESS_KEY_ID != ''
    strategy:
      matrix:
        service: [frontend, userservice, contacts, accounts-db, ledger-db, balancereader, ledgerwriter, transactionhistory, loadgenerator]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract service paths
        id: service-paths
        run: |
          case ${{ matrix.service }} in
            frontend)
              echo "PATH=src/frontend" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=Dockerfile" >> $GITHUB_OUTPUT
              ;;
            userservice)
              echo "PATH=src/accounts/userservice" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=Dockerfile" >> $GITHUB_OUTPUT
              ;;
            contacts)
              echo "PATH=src/accounts/contacts" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=Dockerfile" >> $GITHUB_OUTPUT
              ;;
            accounts-db)
              echo "PATH=src/accounts/accounts-db" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=Dockerfile" >> $GITHUB_OUTPUT
              ;;
            ledger-db)
              echo "PATH=src/ledger/ledger-db" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=Dockerfile" >> $GITHUB_OUTPUT
              ;;
            balancereader)
              echo "PATH=src/ledger/balancereader" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=src/ledger/balancereader/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            ledgerwriter)
              echo "PATH=src/ledger/ledgerwriter" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=src/ledger/ledgerwriter/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            transactionhistory)
              echo "PATH=src/ledger/transactionhistory" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=src/ledger/transactionhistory/Dockerfile" >> $GITHUB_OUTPUT
              ;;
            loadgenerator)
              echo "PATH=src/loadgenerator" >> $GITHUB_OUTPUT
              echo "DOCKERFILE=Dockerfile" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build and push Docker image
        run: |
          SERVICE=${{ matrix.service }}
          ECR_REPOSITORY=${{ env.ECR_REGISTRY }}/muhsinntu-bankofanthos/$SERVICE
          IMAGE_TAG=${{ github.sha }}

          docker build -t $ECR_REPOSITORY:$IMAGE_TAG \
            -f ${{ steps.service-paths.outputs.PATH }}/${{ steps.service-paths.outputs.DOCKERFILE }} \
            ${{ steps.service-paths.outputs.PATH }}

          docker push $ECR_REPOSITORY:$IMAGE_TAG

      - name: Notify Slack on failure
        if: failure()
        run: |
          echo "Build failed for ${{ matrix.service }}"
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Run Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: terraform
        continue-on-error: true

      - name: Run Terraform validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: terraform/environments/aws