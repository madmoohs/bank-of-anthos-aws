name: CD - Deploy to EKS (Dev/Staging/Prod)

on:
  push:
    branches: [ main, develop ]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  security-scan:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          skip-dirs: 'kubernetes-manifests,deployments,extras,monitoring,clusters'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          output_file: 'checkov-results.sarif'
          output_format: 'sarif'
          soft_fail: false
          download_external_modules: true

      - name: Upload Checkov scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'checkov-results.sarif'

      - name: Run Tfsec scan
        uses: aquasecurity/tfsec-action@v1
        with:
          softfail: false
          format: 'sarif'

      - name: Upload Tfsec scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'results.sarif'

  deploy:
    name: Deploy to ${{ matrix.environment }}
    needs: security-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    environment: ${{ matrix.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Determine cluster and namespace
        id: config
        run: |
          case ${{ matrix.environment }} in
            dev)
              echo "CLUSTER_NAME=MuhsinNTU-bankofanthos-dev" >> $GITHUB_OUTPUT
              echo "K8S_CONTEXT=dev" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "CLUSTER_NAME=MuhsinNTU-bankofanthos-staging" >> $GITHUB_OUTPUT
              echo "K8S_CONTEXT=staging" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "CLUSTER_NAME=MuhsinNTU-bankofanthos" >> $GITHUB_OUTPUT
              echo "K8S_CONTEXT=production" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ steps.config.outputs.CLUSTER_NAME }} --region ${{ env.AWS_REGION }} --alias ${{ steps.config.outputs.K8S_CONTEXT }}

      - name: Install AWS Load Balancer Controller
        run: |
          kubectl apply -k "github.com/aws/eks-charts/stable/aws-load-balancer-controller//crds?ref=master"

          helm repo add eks https://aws.github.io/eks-charts
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=${{ steps.config.outputs.CLUSTER_NAME }} \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set image.tag=v2.8.1

      - name: Install External DNS
        run: |
          if [ -n "${{ secrets.EXTERNAL_DNS_ROLE_ARN }}" ]; then
            helm repo add bitnami https://charts.bitnami.com/bitnami
            helm upgrade --install external-dns bitnami/external-dns \
              -n external-dns --create-namespace \
              --set serviceAccount.create=true \
              --set serviceAccount.name=external-dns \
              --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.EXTERNAL_DNS_ROLE_ARN }} \
              --set provider=aws \
              --set domainFilters[0]=bankofanthos.example.com
          else
            echo "Skipping External DNS installation - EXTERNAL_DNS_ROLE_ARN not set"
          fi

      - name: Install Cluster Autoscaler
        run: |
          if [ -n "${{ secrets.CLUSTER_AUTOSCALER_ROLE_ARN }}" ]; then
            helm repo add autoscaling https://kubernetes.github.io/autoscaler
            helm upgrade --install cluster-autoscaler autoscaling/cluster-autoscaler \
              -n kube-system \
              --set autoDiscovery.clusterName=${{ steps.config.outputs.CLUSTER_NAME }} \
              --set awsRegion=${{ env.AWS_REGION }} \
              --set serviceAccount.create=true \
              --set serviceAccount.name=cluster-autoscaler \
              --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.CLUSTER_AUTOSCALER_ROLE_ARN }}
          else
            echo "Skipping Cluster Autoscaler installation - CLUSTER_AUTOSCALER_ROLE_ARN not set"
          fi

      - name: Create namespaces
        run: |
          kubectl create namespace bank-of-anthos --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy secrets
        run: |
          kubectl create secret generic jwt-key \
            --from-file=key.pem=extras/jwt/jwt-secret.yaml \
            -n bank-of-anthos \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic database-credentials \
            --from-literal=password='SecurePassword123!' \
            -n bank-of-anthos \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy application (Kustomize)
        run: |
          kubectl apply -k deployments/overlays/${{ matrix.environment }}/

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/frontend -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/userservice -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/contacts -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/balancereader -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/ledgerwriter -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/transactionhistory -n bank-of-anthos --timeout=300s

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == 'success' ]; then
            echo "Deployment to ${{ matrix.environment }} completed successfully!"
          else
            echo "Deployment to ${{ matrix.environment }} failed!"
          fi