name: CD - Deploy to EKS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-southeast-1
  CLUSTER_NAME: MuhsinNTU-bankofanthos
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install AWS Load Balancer Controller
        run: |
          kubectl apply -k "github.com/aws/eks-charts/stable/aws-load-balancer-controller//crds?ref=master"

          helm repo add eks https://aws.github.io/eks-charts
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=${{ env.CLUSTER_NAME }} \
            --set serviceAccount.create=false \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set image.tag=v2.8.1

      - name: Install External DNS
        if: ${{ secrets.EXTERNAL_DNS_ROLE_ARN != '' }}
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm upgrade --install external-dns bitnami/external-dns \
            -n external-dns --create-namespace \
            --set serviceAccount.create=true \
            --set serviceAccount.name=external-dns \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.EXTERNAL_DNS_ROLE_ARN }} \
            --set provider=aws \
            --set domainFilters[0]=bankofanthos.example.com

      - name: Install Cluster Autoscaler
        if: ${{ secrets.CLUSTER_AUTOSCALER_ROLE_ARN != '' }}
        run: |
          helm repo add autoscaling https://kubernetes.github.io/autoscaler
          helm upgrade --install cluster-autoscaler autoscaling/cluster-autoscaler \
            -n kube-system \
            --set autoDiscovery.clusterName=${{ env.CLUSTER_NAME }} \
            --set awsRegion=${{ env.AWS_REGION }} \
            --set serviceAccount.create=true \
            --set serviceAccount.name=cluster-autoscaler \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.CLUSTER_AUTOSCALER_ROLE_ARN }}

      - name: Create namespaces
        run: |
          kubectl create namespace bank-of-anthos --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy secrets
        run: |
          kubectl create secret generic jwt-key \
            --from-file=key.pem=extras/jwt/jwt-secret.yaml \
            -n bank-of-anthos \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic database-credentials \
            --from-literal=password='SecurePassword123!' \
            -n bank-of-anthos \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy application
        run: |
          # Replace image references in deployments
          sed -i "s|gcr.io/bank-of-anthos-ci|${{ env.ECR_REGISTRY }}/muhsinntu-bankofanthos|g" kubernetes-manifests/*.yaml

          # Update image tags
          sed -i "s|:v0.5.11@sha256:[a-f0-9]*|:${{ github.sha }}|g" kubernetes-manifests/*.yaml

          # Apply manifests
          kubectl apply -f kubernetes-manifests/

      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/frontend -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/userservice -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/contacts -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/balancereader -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/ledgerwriter -n bank-of-anthos --timeout=300s
          kubectl rollout status deployment/transactionhistory -n bank-of-anthos --timeout=300s

      - name: Notify deployment status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "Deployment to EKS completed successfully!"
          else
            echo "Deployment to EKS failed!"
          fi