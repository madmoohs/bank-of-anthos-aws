apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-db
  namespace: bank-of-anthos
spec:
  selector:
    matchLabels:
      app: ledger-db
  template:
    metadata:
      labels:
        app: ledger-db
    spec:
      containers:
      - name: postgres
        image: gcr.io/bank-of-anthos-ci/ledger-db:v0.5.11@sha256:9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a8b7c
        env:
        - name: POSTGRES_DB
          value: "ledger-db"
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: password
        ports:
        - containerPort: 5432
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-db
  namespace: bank-of-anthos
spec:
  type: ClusterIP
  selector:
    app: ledger-db
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432